<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI Pill</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tableau/extensions-api-master/lib/tableau.extensions.1.latest.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden;
            background-color: white; /* Transparency removed as requested */
        }
        #app {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100vw;
        }
        .kpi-pill {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 2vh 5vw; border-radius: 9999px; font-weight: 800;
            font-size: min(10vw, 10vh); white-space: nowrap; transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        #settings-pane {
            display: none; position: fixed; inset: 0; background: white;
            padding: 20px; z-index: 50; flex-direction: column; overflow-y: auto;
        }
        #settings-pane.active { display: flex; }
        .color-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px;
        }
        .color-option {
            height: 40px; border-radius: 8px; cursor: pointer; border: 2px solid transparent;
        }
        .color-option.selected { border-color: #2563eb; }
    </style>
</head>
<body>
    <div id="app">
        <div id="main-view" class="w-full h-full flex items-center justify-center p-4">
            <div id="pill" class="kpi-pill bg-gray-100 text-gray-800">--</div>
        </div>

        <div id="settings-pane">
            <h2 class="text-xl font-bold mb-4 border-b pb-2">KPI Pill Settings</h2>
            
            <label class="block text-sm font-semibold mb-1">Data Source Worksheet</label>
            <select id="ws-select" class="w-full border rounded p-2 mb-4 text-sm"></select>

            <label class="block text-sm font-semibold mb-1">Measure Field</label>
            <select id="field-select" class="w-full border rounded p-2 mb-4 text-sm" disabled></select>

            <label class="block text-sm font-semibold mb-2">Pill Color Theme</label>
            <div id="color-picker" class="color-grid"></div>

            <div class="mt-8 flex gap-3">
                <button onclick="saveSettings()" class="bg-blue-600 text-white flex-1 rounded py-2 font-bold">Save & Close</button>
                <button onclick="hideSettings()" class="bg-gray-200 text-gray-700 px-4 rounded py-2 font-bold">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let selectedColor = '#EEF0FA';
        let selectedTextColor = '#6A71D0';
        const colors = [
            { bg: '#EAF5EE', text: '#52A569' }, { bg: '#F8EBEA', text: '#CB5753' }, { bg: '#EEF0FA', text: '#6A71D0' },
            { bg: '#FFF7ED', text: '#EA580C' }, { bg: '#F0F9FF', text: '#0284C7' }, { bg: '#F5F3FF', text: '#7C3AED' },
            { bg: '#ECFDF5', text: '#059669' }, { bg: '#FEF2F2', text: '#DC2626' }, { bg: '#FDF2F8', text: '#DB2777' },
            { bg: '#F0FDFA', text: '#0D9488' }, { bg: '#EFF6FF', text: '#2563EB' }, { bg: '#FAF5FF', text: '#9333EA' },
            { bg: '#FFFBEB', text: '#D97706' }, { bg: '#F9FAFB', text: '#4B5563' }, { bg: '#F0FDF4', text: '#16A34A' },
            { bg: '#FFF1F2', text: '#E11D48' }, { bg: '#F5F5F4', text: '#78716C' }, { bg: '#ECFEFF', text: '#0891B2' },
            { bg: '#F8FAFC', text: '#475569' }, { bg: '#FDF4FF', text: '#A21CAF' }
        ];

        document.addEventListener("DOMContentLoaded", () => {
            initColorPicker();
            if (typeof tableau === 'undefined' || !tableau.extensions) return;

            tableau.extensions.initializeAsync({'configure': showSettings}).then(() => {
                const savedWs = tableau.extensions.settings.get('worksheet');
                const savedField = tableau.extensions.settings.get('field');
                const savedBg = tableau.extensions.settings.get('bgColor');
                const savedText = tableau.extensions.settings.get('textColor');

                if (savedBg) {
                    selectedColor = savedBg;
                    selectedTextColor = savedText;
                }

                if (savedWs && savedField) {
                    renderPill();
                } else {
                    showSettings();
                }
            });
        });

        function initColorPicker() {
            const picker = document.getElementById('color-picker');
            colors.forEach((c, i) => {
                const div = document.createElement('div');
                div.className = 'color-option';
                div.style.backgroundColor = c.bg;
                div.onclick = () => selectColor(c.bg, c.text, div);
                if (c.bg === selectedColor) div.classList.add('selected');
                picker.appendChild(div);
            });
        }

        function selectColor(bg, text, element) {
            selectedColor = bg;
            selectedTextColor = text;
            document.querySelectorAll('.color-option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
        }

        function showSettings() {
            document.getElementById('settings-pane').classList.add('active');
            populateWorksheets();
        }

        function hideSettings() {
            document.getElementById('settings-pane').classList.remove('active');
        }

        async function populateWorksheets() {
            const dashboard = tableau.extensions.dashboardContent.dashboard;
            const wsSelect = document.getElementById('ws-select');
            wsSelect.innerHTML = '<option value="">-- Select Worksheet --</option>';
            dashboard.worksheets.forEach(ws => {
                const opt = document.createElement('option');
                opt.value = ws.name; opt.text = ws.name;
                wsSelect.appendChild(opt);
            });
            const savedWs = tableau.extensions.settings.get('worksheet');
            if (savedWs) { wsSelect.value = savedWs; loadFields(savedWs); }
            wsSelect.onchange = (e) => loadFields(e.target.value);
        }

        async function loadFields(wsName) {
            const fieldSelect = document.getElementById('field-select');
            if (!wsName) { fieldSelect.disabled = true; return; }
            const worksheet = tableau.extensions.dashboardContent.dashboard.worksheets.find(w => w.name === wsName);
            if (worksheet) {
                const dataTable = await worksheet.getSummaryDataAsync({ maxRows: 1 });
                fieldSelect.innerHTML = '<option value="">-- Select Field --</option>';
                fieldSelect.disabled = false;
                dataTable.columns.forEach(col => {
                    const opt = document.createElement('option');
                    opt.value = col.fieldName; opt.text = col.fieldName;
                    fieldSelect.appendChild(opt);
                });
                const savedField = tableau.extensions.settings.get('field');
                if (savedField) fieldSelect.value = savedField;
            }
        }

        async function saveSettings() {
            const ws = document.getElementById('ws-select').value;
            const field = document.getElementById('field-select').value;
            if (ws && field) {
                tableau.extensions.settings.set('worksheet', ws);
                tableau.extensions.settings.set('field', field);
                tableau.extensions.settings.set('bgColor', selectedColor);
                tableau.extensions.settings.set('textColor', selectedTextColor);
                await tableau.extensions.settings.saveAsync();
                hideSettings();
                renderPill();
            }
        }

        async function renderPill() {
            const wsName = tableau.extensions.settings.get('worksheet');
            const fieldName = tableau.extensions.settings.get('field');
            const pill = document.getElementById('pill');
            const worksheet = tableau.extensions.dashboardContent.dashboard.worksheets.find(w => w.name === wsName);
            
            try {
                const dataTable = await worksheet.getSummaryDataAsync();
                const fieldIndex = dataTable.columns.findIndex(c => c.fieldName === fieldName);
                if (fieldIndex >= 0 && dataTable.data.length > 0) {
                    pill.innerText = dataTable.data[0][fieldIndex].formattedValue;
                } else {
                    pill.innerText = "No Data";
                }
                pill.style.backgroundColor = selectedColor;
                pill.style.color = selectedTextColor;
            } catch (e) { pill.innerText = "Error"; }
        }
    </script>
</body>
</html>
