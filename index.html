<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Transparent Test</title>
    <style>
        /* Force total transparency on everything using the universal selector */
        * {
            background-color: transparent !important;
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
        }

        html, body, head {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: transparent !important;
            background: none !important;
            background-image: none !important;
        }

        .test-text {
            color: #52A569;
            font-family: sans-serif;
            font-weight: bold;
            font-size: 2rem;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="test-text">
        Transparent Test
    </div>
</body>
</html>
