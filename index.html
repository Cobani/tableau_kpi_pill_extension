<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI Pill</title>
    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Load Tableau Extensions API -->
    <script src="https://cdn.jsdelivr.net/npm/@tableau/extensions-api-master/lib/tableau.extensions.1.latest.js"></script>
</head>
<body>
    <div id="app">
        <div id="main-view" class="w-full h-full flex items-center justify-center p-4">
            <div id="pill" class="kpi-pill">--</div>
        </div>

        <!-- Formatting Menu UI -->
        <div id="settings-pane">
            <h2 class="text-xl font-bold mb-4 border-b pb-2">KPI Pill Settings</h2>
            
            <label class="block text-sm font-semibold mb-2">Pill Color Theme</label>
            <div id="color-picker" class="color-grid"></div>

            <div class="mt-8 flex gap-3">
                <button onclick="saveSettings()" class="bg-blue-600 text-white flex-1 rounded py-2 font-bold" style="background-color: #2563eb; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 4px;">Save & Close</button>
                <button onclick="hideSettings()" class="bg-gray-200 text-gray-700 px-4 rounded py-2 font-bold" style="background-color: #e5e7eb; color: #374151; border: none; padding: 10px; cursor: pointer; border-radius: 4px;">Cancel</button>
            </div>
        </div>
    </div>

    <!-- External JavaScript -->
    <script src="script.js"></script>
</body>
</html>
